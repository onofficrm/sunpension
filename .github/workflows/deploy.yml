name: Deploy to Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: sunpension-ftp-deploy
  cancel-in-progress: true

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: builder/poolvila/package-lock.json

      - name: Build poolvila (Google Studio → dist)
        run: |
          cd builder/poolvila
          npm ci
          npm run build
          test -f dist/index.html
          test -n "$(ls dist/assets/*.js 2>/dev/null | head -1)"
          rm -rf ../../plugin/onoff-builder-bridge/imports/poolvila/assets
          cp dist/index.html ../../plugin/onoff-builder-bridge/imports/poolvila/
          cp -R dist/assets ../../plugin/onoff-builder-bridge/imports/poolvila/
          cp public/logo.svg ../../plugin/onoff-builder-bridge/imports/poolvila/
          echo "poolvila: $(ls -la ../../plugin/onoff-builder-bridge/imports/poolvila/assets/)"

      - name: Clean junk files before upload
        run: |
          find . -name '._*' -delete 2>/dev/null || true
          find . -name '.DS_Store' -delete 2>/dev/null || true

      - name: Inject Google Maps API key
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: |
          perl -pi -e 's/JS_MAPS_API_KEY/$ENV{GOOGLE_MAPS_API_KEY}/g' plugin/editor/cheditor5/popup/google_map.html

      - name: Check FTP port reachable
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq netcat-openbsd >/dev/null
          port="${FTP_PORT:-21}"
          echo "FTP target: ${FTP_SERVER}:${port}"
          for i in 1 2 3; do
            if nc -zv -w 15 "$FTP_SERVER" "$port"; then
              echo "FTP port open (attempt $i)"
              exit 0
            fi
            echo "retry in 20s..."
            sleep 20
          done
          echo "::error::FTP 서버(${FTP_SERVER}:${port})에 연결할 수 없습니다. 호스팅 FTP 허용 IP·포트·서비스 상태를 확인하세요."
          exit 1

      - name: Deploy via FTP (single session)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          protocol: ftp
          local-dir: ./
          server-dir: /public_html/
          state-name: sunpension-deploy-v2
          log-level: minimal
          timeout: 600000
          exclude: |
            **/.git*
            **/.github/**
            **/.deploy/**
            **/.DS_Store
            **/.vscode/**
            **/._*
            _backup_transfer_*/
            **/_backup_transfer_*/
            _BUILDER_INPUT/**
            builder/**
            docs/**
            plugin/auto_comment/packages/**
            data/**
            cache/**
            session/**
            tmp/**
            *.log
            .env
            .env.*
